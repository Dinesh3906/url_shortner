version: '3.8'

services:
  mongodb:
    image: mongo:6.0-alpine
    container_name: shortlink-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shortlink-network
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: shortlink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shortlink-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: shortlink-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/shortlink
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=shortlink_super_secure_secret_key_2026
      - JWT_EXPIRE=30d
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:5000
    depends_on:
      - mongodb
      - redis
    networks:
      - shortlink-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: shortlink-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - shortlink-network
    restart: unless-stopped

networks:
  shortlink-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
